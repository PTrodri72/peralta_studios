<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustStore MTA</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://www.paypal.com/sdk/js?client-id=sb&currency=EUR"></script>

<style>
body {
background:#0b0f19;
color:white;
font-family:sans-serif;
}

.tab {
display:none;
}

.tab.active {
display:block;
}

.gradient {
background:linear-gradient(135deg,#7c3aed,#4c1d95);
}
</style>
</head>
<body>

<nav class="bg-gray-900 border-b border-gray-800 p-4 flex justify-between items-center">
<h1 class="text-2xl font-bold">
TrustStore <span class="text-purple-500">MTA</span>
</h1>

<div class="flex gap-4 items-center">
<a href="#inicio">Início</a>
<a href="#produtos">Produtos</a>
<a href="#cliente" id="cliente-menu" class="hidden">Cliente</a>
<a href="#admin" id="admin-menu" class="hidden">Admin</a>

<div id="auth-area">
<a href="#login" class="gradient px-4 py-2 rounded-lg">
Entrar
</a>
</div>
</div>
</nav>

<section id="inicio" class="tab active p-10 text-center">
<h1 class="text-5xl font-bold mb-4">
Scripts Premium para MTA
</h1>
<p class="text-gray-400">
A melhor loja de scripts para o teu servidor.
</p>
</section>

<section id="produtos" class="tab p-10">
<h2 class="text-3xl font-bold mb-6">Produtos</h2>

<div id="produtos-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
</section>

<section id="login" class="tab p-10 max-w-md mx-auto">
<div class="bg-gray-900 p-6 rounded-xl border border-gray-800">

<h2 class="text-3xl font-bold mb-6">Login</h2>

<form id="login-form" class="space-y-4">
<input id="email" type="email" placeholder="Email" class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<input id="password" type="password" placeholder="Password" class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<button class="gradient w-full py-3 rounded-lg font-bold">
Entrar
</button>
</form>

<button id="register-btn" class="mt-4 text-purple-400">
Criar Conta
</button>

</div>
</section>

<section id="cliente" class="tab p-10">
<h2 class="text-3xl font-bold mb-6">Área Cliente</h2>

<div id="downloads-area" class="space-y-4"></div>
</section>

<section id="admin" class="tab p-10">
<h2 class="text-3xl font-bold mb-6">Painel Admin</h2>

<div class="bg-gray-900 border border-gray-800 rounded-xl p-6 mb-8">
<h3 class="text-2xl font-bold mb-4">Adicionar Produto</h3>

<div class="space-y-4">
<input id="produto-nome" placeholder="Nome" class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<input id="produto-preco" placeholder="Preço" type="number" class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<input id="produto-imagem" placeholder="Imagem URL" class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<input id="produto-download" placeholder="Download URL" class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<button onclick="adicionarProduto()" class="gradient px-6 py-3 rounded-lg font-bold">
Adicionar Produto
</button>
</div>
</div>

<div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
<h3 class="text-2xl font-bold mb-4">Dar Produto a Cliente</h3>

<div class="space-y-4">
<input id="cliente-email" placeholder="Email Cliente" class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<input id="produto-id" placeholder="ID Produto" class="w-full p-3 rounded bg-gray-800 border border-gray-700">

<button onclick="atribuirProduto()" class="gradient px-6 py-3 rounded-lg font-bold">
Atribuir Produto
</button>
</div>
</div>
</section>

<script>

const supabaseUrl = 'YOUR_SUPABASE_URL'
const supabaseKey = 'YOUR_SUPABASE_ANON_KEY'

const supabase = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
)

const ADMIN_EMAIL = 'igor.rodrigues2120@gmail.com'

let currentUser = null

function showTab() {

const hash = window.location.hash || '#inicio'

if(hash === '#admin') {

if(!currentUser || currentUser.email !== ADMIN_EMAIL) {
window.location.hash = '#inicio'
return
}
}

if(hash === '#cliente' && !currentUser) {
window.location.hash = '#login'
return
}

const tabs = document.querySelectorAll('.tab')

tabs.forEach(tab => tab.classList.remove('active'))

const active = document.querySelector(hash)

if(active) {
active.classList.add('active')
}
}

window.addEventListener('hashchange', showTab)

async function loadSession() {

const {
    data: { session }
} = await supabase.auth.getSession()

if(session) {
currentUser = session.user
updateUI()
}

showTab()
}

function updateUI() {

if(!currentUser) return

const auth = document.getElementById('auth-area')

auth.innerHTML = `
<button onclick="logout()" class="bg-red-600 px-4 py-2 rounded-lg">
Logout
</button>
`

document.getElementById('cliente-menu').classList.remove('hidden')

if(currentUser.email === ADMIN_EMAIL) {
document.getElementById('admin-menu').classList.remove('hidden')
}

loadDownloads()
}

const loginForm = document.getElementById('login-form')

loginForm.addEventListener('submit', async (e) => {

 e.preventDefault()

 const email = document.getElementById('email').value
 const password = document.getElementById('password').value

 const { error } = await supabase.auth.signInWithPassword({
 email,
 password
 })

 if(error) {
 alert(error.message)
 return
 }

 location.reload()
})

const registerBtn = document.getElementById('register-btn')

registerBtn.addEventListener('click', async () => {

const email = document.getElementById('email').value
const password = document.getElementById('password').value

const { error } = await supabase.auth.signUp({
email,
password
})

if(error) {
alert(error.message)
return
}

alert('Conta criada!')
})

async function logout() {
await supabase.auth.signOut()
location.reload()
}

async function loadProdutos() {

const { data } = await supabase
.from('products')
.select('*')

const grid = document.getElementById('produtos-grid')

grid.innerHTML = ''

if(!data) return

data.forEach(produto => {

grid.innerHTML += `
<div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
<img src="${produto.image}" class="w-full h-48 object-cover">

<div class="p-4">
<h3 class="text-xl font-bold mb-2">${produto.name}</h3>
<p class="text-purple-400 text-2xl font-black mb-4">€${produto.price}</p>

<button onclick="comprarProduto(${produto.id})"
class="gradient px-4 py-2 rounded-lg w-full">
Comprar
</button>
</div>
</div>
`
})
}

async function adicionarProduto() {

const name = document.getElementById('produto-nome').value
const price = document.getElementById('produto-preco').value
const image = document.getElementById('produto-imagem').value
const download = document.getElementById('produto-download').value

const { error } = await supabase
.from('products')
.insert([
{
name,
price,
image,
download
}
])

if(error) {
alert(error.message)
return
}

alert('Produto adicionado!')
loadProdutos()
}

async function atribuirProduto() {

const email = document.getElementById('cliente-email').value
const productId = document.getElementById('produto-id').value

const {
 data: userData
} = await supabase
.from('profiles')
.select('*')
.eq('email', email)
.single()

if(!userData) {
alert('Cliente não encontrado')
return
}

await supabase
.from('purchases')
.insert([
{
user_id: userData.id,
product_id: productId
}
])

alert('Produto atribuído!')
}

async function loadDownloads() {

if(!currentUser) return

const {
 data
} = await supabase
.from('purchases')
.select(`
*,
products(*)
`)
.eq('user_id', currentUser.id)

const area = document.getElementById('downloads-area')

area.innerHTML = ''

if(!data) return

data.forEach(item => {

area.innerHTML += `
<div class="bg-gray-900 border border-gray-800 p-4 rounded-xl flex justify-between items-center">
<div>
<h3 class="font-bold text-xl">${item.products.name}</h3>
<p class="text-gray-400">Download disponível</p>
</div>

<a href="${item.products.download}"
target="_blank"
class="gradient px-4 py-2 rounded-lg">
Download
</a>
</div>
`
})
}

async function comprarProduto(id) {

if(!currentUser) {
window.location.hash = '#login'
return
}

await supabase
.from('purchases')
.insert([
{
user_id: currentUser.id,
product_id: id
}
])

alert('Produto comprado!')
}

loadSession()
loadProdutos()
showTab()

</script>

</body>
</html>
